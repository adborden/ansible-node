---
- name: Reboot
  hosts: all
  serial: 1
  gather_facts: false
  become: true
  tasks:
    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot
      ansible.builtin.reboot:
      when: force_reboot is defined or reboot_required.stat.exists
